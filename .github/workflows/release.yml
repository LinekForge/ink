name: Release · auto-build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Ink ${{ github.ref_name }}
          releaseBody: |
            macOS DMG + Windows 安装包自动构建。

            **macOS**：首次打开会报 Gatekeeper 警告（unsigned app）——右键 app 选「打开」一次即可永久放行。
            **Windows**：运行安装包即可，无需额外依赖（WebView2 随 Windows 10/11 预装）。

            详见 [README](https://github.com/LinekForge/ink/blob/main/README.md)。
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: x86_64-pc-windows-msvc

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Ink ${{ github.ref_name }}
          releaseBody: |
            macOS DMG + Windows 安装包自动构建。

            **macOS**：首次打开会报 Gatekeeper 警告（unsigned app）——右键 app 选「打开」一次即可永久放行。
            **Windows**：运行安装包即可，无需额外依赖（WebView2 随 Windows 10/11 预装）。

            详见 [README](https://github.com/LinekForge/ink/blob/main/README.md)。
          releaseDraft: false
          prerelease: false
